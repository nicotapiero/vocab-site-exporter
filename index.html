<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>KOReader Vocabulary Export</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>

  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 40px;
      background: #f7f7f7;
      color: #222;
    }

    h1 {
      margin-bottom: 10px;
    }

    #dropzone {
      border: 2px dashed #999;
      padding: 40px;
      text-align: center;
      background: white;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    #dropzone.dragover {
      border-color: #4CAF50;
      background: #f0fff4;
    }

    #controls {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #4CAF50;
      color: white;
      cursor: pointer;
      font-weight: 500;
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    table {
      margin-top: 20px;
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 12px;
      overflow: hidden;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #eee;
      text-align: left;
      font-size: 14px;
    }

    th {
      background: #fafafa;
    }

    #status {
      margin-top: 10px;
      color: #666;
    }
  </style>
</head>
<body>

  <h1>📚 KOReader → Google Sheets Export</h1>

  <div id="dropzone">
    Drop your <b>vocabulary_builder.sqlite3</b> file here<br/>
    or click to select
    <input type="file" id="fileInput" hidden />
  </div>

  <div id="controls">
    <button id="exportBtn" disabled>Export CSV</button>
    <span id="status">No file loaded</span>
  </div>

  <table id="table" style="display:none;">
    <thead>
      <tr>
        <th>Word</th>
        <th>Date Added</th>
        <th>Example Phrase</th>
        <th>Tags</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

<script>
let db;
let rows = [];

const dropzone = document.getElementById("dropzone");
const fileInput = document.getElementById("fileInput");
const exportBtn = document.getElementById("exportBtn");
const status = document.getElementById("status");
const table = document.getElementById("table");
const tbody = table.querySelector("tbody");

dropzone.onclick = () => fileInput.click();

dropzone.ondragover = e => {
  e.preventDefault();
  dropzone.classList.add("dragover");
};

dropzone.ondragleave = () => {
  dropzone.classList.remove("dragover");
};

dropzone.ondrop = e => {
  e.preventDefault();
  dropzone.classList.remove("dragover");
  handleFile(e.dataTransfer.files[0]);
};

fileInput.onchange = e => handleFile(e.target.files[0]);

initSqlJs({
  locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${file}`
}).then(SQL => {
  window.SQL = SQL;
});

async function handleFile(file) {
  if (!file) return;

  status.textContent = "Loading database...";

  const buffer = await file.arrayBuffer();
  db = new SQL.Database(new Uint8Array(buffer));

  runQuery();
}

function runQuery() {
  const query = `
    SELECT
      COALESCE(NULLIF(TRIM(v.highlight), ''), v.word) AS word,
      v.create_time AS date_added,
      '' AS discovery_details,
      (v.prev_context ||
       COALESCE(NULLIF(TRIM(v.highlight), ''), v.word) ||
       v.next_context) AS example_phrase,
      t.name AS tags,
      '' AS extra_info,
      'Nico' AS owner
    FROM vocabulary v
    LEFT JOIN title t ON v.title_id = t.id
    WHERE COALESCE(NULLIF(TRIM(v.highlight), ''), v.word) IS NOT NULL
      AND TRIM(COALESCE(NULLIF(TRIM(v.highlight), ''), v.word)) != ''
    ORDER BY v.create_time ASC;
  `;

  const result = db.exec(query)[0];
  rows = result ? result.values : [];

  renderTable();
}

function renderTable() {
  tbody.innerHTML = "";

  rows.forEach(r => {
    const tr = document.createElement("tr");

    const date = new Date(r[1] * 1000).toLocaleString();

    tr.innerHTML = `
      <td>${escapeHTML(r[0])}</td>
      <td>${date}</td>
      <td>${escapeHTML(r[3])}</td>
      <td>${escapeHTML(r[4] || "")}</td>
    `;

    tbody.appendChild(tr);
  });

  table.style.display = rows.length ? "table" : "none";
  exportBtn.disabled = !rows.length;
  status.textContent = `${rows.length} words loaded`;
}

exportBtn.onclick = () => {
  const headers = [
    "Word",
    "Date Added",
    "Discovery Details",
    "Example Phrase",
    "Tags",
    "Extra Info",
    "Owner"
  ];

  const csv = [
    headers.join(","),
    ...rows.map(r => [
      r[0],
      r[1],
      "",
      r[3],
      r[4] || "",
      "",
      "Nico"
    ].map(v => `"${(v ?? "").toString().replace(/"/g, '""')}"`).join(","))
  ].join("\n");

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "koreader_vocab.csv";
  a.click();
};

function escapeHTML(str) {
  return (str || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}
</script>

</body>
</html>
